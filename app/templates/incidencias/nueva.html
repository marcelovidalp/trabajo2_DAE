{% extends "base.html" %}

{% block title %}Reportar Incidencia{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <h2 class="mb-4">Reportar nueva incidencia</h2>
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Título <span class="text-danger">*</span></label>
                <input type="text" name="titulo" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Descripción <span class="text-danger">*</span></label>
                <textarea name="descripcion" class="form-control" rows="4" required></textarea>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Categoría <span class="text-danger">*</span></label>
                    <input type="text" name="categoria" class="form-control" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Prioridad</label>
                    <select name="prioridad" class="form-select">
                        <option value="baja">Baja</option>
                        <option value="media" selected>Media</option>
                        <option value="alta">Alta</option>
                        <option value="critica">Crítica</option>
                    </select>
                </div>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Tu nombre <span class="text-danger">*</span></label>
                    <input type="text" name="reportado_por" class="form-control" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Tu email <span class="text-danger">*</span></label>
                    <input type="email" name="email_reportante" class="form-control" required>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">Área</label>
                <select name="area_id" class="form-select">
                    <option value="">— Sin área —</option>
                    {% for area in areas %}
                    <option value="{{ area.id }}">{{ area.nombre }}</option>
                    {% endfor %}
                </select>
            </div>
            <button type="submit" class="btn btn-primary">
                <i class="bi bi-send me-2"></i>Enviar incidencia
            </button>
            <a href="{{ url_for('main.index') }}" class="btn btn-outline-secondary ms-2">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
