<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso de administrador — InciTrack</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="login-wrapper">
    <div class="login-card">

        <div class="login-logo">
            <i class="bi bi-clipboard2-pulse-fill"></i>
        </div>

        <div class="text-center mb-4">
            <h4 class="fw-bold mb-1" style="color:#0f172a;">InciTrack</h4>
            <p class="text-muted small mb-0">Panel de administración — acceso restringido</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }} d-flex align-items-center gap-2 mb-3 py-2 px-3">
                        <i class="bi bi-exclamation-circle-fill flex-shrink-0"></i>
                        <span class="small">{{ message }}</span>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('auth.login', next=request.args.get('next', '')) }}" novalidate>
            <div class="mb-3">
                <label for="username" class="form-label">Usuario</label>
                <div class="input-group">
                    <span class="input-group-text bg-white border-end-0" style="border-color:#e2e8f0;">
                        <i class="bi bi-person text-muted"></i>
                    </span>
                    <input
                        type="text"
                        id="username"
                        name="username"
                        class="form-control border-start-0"
                        style="border-color:#e2e8f0;"
                        placeholder="Nombre de usuario"
                        autocomplete="username"
                        required
                        autofocus
                    >
                </div>
            </div>

            <div class="mb-4">
                <label for="password" class="form-label">Contraseña</label>
                <div class="input-group">
                    <span class="input-group-text bg-white border-end-0" style="border-color:#e2e8f0;">
                        <i class="bi bi-lock text-muted"></i>
                    </span>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        class="form-control border-start-0"
                        style="border-color:#e2e8f0;"
                        placeholder="Contraseña"
                        autocomplete="current-password"
                        required
                    >
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100 py-2">
                <i class="bi bi-box-arrow-in-right me-2"></i>Iniciar sesión
            </button>
        </form>

        <div class="text-center mt-4">
            <a href="{{ url_for('main.index') }}" class="text-decoration-none small text-muted">
                <i class="bi bi-arrow-left me-1"></i>Volver al inicio
            </a>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
